            }
            const speed = parseFloat(document.getElementById('speed-slider').value) || 1.0;
            const durationSeconds = loadedMidi.duration / speed;
            durationEl.textContent = formatTime(durationSeconds);
        }

        // スピードスライダー
        document.getElementById('speed-slider').addEventListener('input', (e) => {
            document.getElementById('speed-display').textContent = `${parseFloat(e.target.value).toFixed(1)}x`;
            updateDurationDisplay();
        });

        // --- ゲームスタート ---
        startBtn.addEventListener('click', async () => {
            if (gameState === 'playing' || gameState === 'countdown' || !loadedMidi) return;
            
            const speed = parseFloat(document.getElementById('speed-slider').value);
            const selectedTracks = Array.from(document.querySelectorAll('#track-list input:checked')).map(cb => parseInt(cb.value));
            const gameMode = document.getElementById('game-mode-select').value;
            const isEasyMode = gameMode === 'easy';
            const isTapOnlyMode = gameMode === 'tap';
            
            if (selectedTracks.length === 0) {
                const title = document.querySelector('#setup-panel p');
                title.classList.add('text-red-500');
                setTimeout(() => title.classList.remove('text-red-500'), 1000);
                return;
            }

            initAudio();
            await Tone.start();
            
            uiStartScreen.style.opacity = '0';
            setTimeout(() => {
                uiStartScreen.classList.add('hidden');
                uiGameHeader.classList.remove('hidden');
                requestAnimationFrame(() => { uiGameHeader.style.opacity = '1'; });
            }, 500);

            score = 0;
            combo = 0;
            maxCombo = 0;
            stats = { perfect: 0, great: 0, miss: 0 };
            particles = [];
            judgeTexts = [];
            updateScoreUI();
            
            Tone.Transport.stop();
            Tone.Transport.position = 0;
            Tone.Transport.cancel();
            
            let rawNotes = [];
            const START_OFFSET = 2.0; // GO!から最初の音が鳴るまでの猶予時間（ノーツの落下時間）
            
            // トラックごとにノートをスケジュール
            loadedMidi.tracks.forEach((track, trackIdx) => {
                const isSelected = selectedTracks.includes(trackIdx);
                
                track.notes.forEach(note => {
                    // スピードと開始オフセットを加味した時間
                    const scaledTime = (note.time / speed) + START_OFFSET;
                    const scaledDuration = note.duration / speed;
                    
                    if (isSelected) {
                        // EASYモードの場合は短いノーツを除外する（0.3秒未満など）
                        if (isEasyMode && scaledDuration < 0.3) {
                             Tone.Transport.schedule((time) => {
                                const dur = Math.min(scaledDuration, 0.5);
                                synth.triggerAttackRelease(note.name, dur, time, note.velocity * 0.3);
                            }, scaledTime);
                            return; 
                        }

                        // プレイヤーが叩くノーツとして一時保存
                        rawNotes.push({
                            time: scaledTime,
                            duration: scaledDuration,
                            midiNote: note.midi,
                            name: note.name,
                            velocity: note.velocity
                        });
                        // プレイヤー操作トラックもタイミングに合わせて自動発音
                        Tone.Transport.schedule((time) => {
                            const dur = Math.min(scaledDuration, 0.5);
                            synth.triggerAttackRelease(note.name, dur, time, note.velocity * 0.8);
                        }, scaledTime);
                    } else {
                        // BGMとして自動再生するノーツ
                        Tone.Transport.schedule((time) => {
                            const dur = Math.min(scaledDuration, 0.5);
                            synth.triggerAttackRelease(note.name, dur, time, note.velocity * 0.3);
                        }, scaledTime);
                    }
                });
            });

            // --- 1. 同時発音（和音）の間引き ---
            // プレイ用のノーツ群を時間順にソートし、同時押しが横に並ばないようにする
            rawNotes.sort((a, b) => a.time - b.time);
            let processedNotes = [];
            let lastTimeObj = -1;

            rawNotes.forEach(note => {
                // 0.05秒以内のノーツは同時発音とみなし、先着1つだけをプレイ用レーンに採用する
                if (Math.abs(note.time - lastTimeObj) < 0.05) {
                    return;
                }
                lastTimeObj = note.time;
                processedNotes.push(note);
            });

            // --- 2. 縦の密接（連打）のロングノーツ化 ---
            let mergedNotes = [];
            for (let lane = 0; lane < LANE_COUNT; lane++) {
                // レーンごとに抽出
                let laneRawNotes = processedNotes.filter(n => (n.midiNote % LANE_COUNT) === lane);
                laneRawNotes.sort((a, b) => a.time - b.time);

                if (isTapOnlyMode) {
                    // TAP ONLYモードの場合は結合処理をせず、全て単発にする
                    laneRawNotes.forEach(note => mergedNotes.push({ ...note, subNotes: [] }));
                } else {
                    let currentNote = null;
                    for (let note of laneRawNotes) {
                        if (!currentNote) {
                            currentNote = { ...note, subNotes: [] };
                            continue;
                        }

                        let currentEndTime = currentNote.time + currentNote.duration;
                        // 同一レーンで、前のノーツの終わりから 0.15秒以内に次のノーツが来るなら結合する
                        if (note.time <= currentEndTime + 0.15) {
                            currentNote.duration = Math.max(currentNote.duration, (note.time + note.duration) - currentNote.time);
                            currentNote.subNotes.push(note.time); // 結合されたノーツのタイミングを記録
                        } else {
                            mergedNotes.push(currentNote);
                            currentNote = { ...note, subNotes: [] };
                        }
                    }
                    if (currentNote) mergedNotes.push(currentNote);
                }
            }

            // 最終的なノーツリストを作成
            mergedNotes.sort((a, b) => a.time - b.time);
            notes = [];

            mergedNotes.forEach(note => {
                const lane = note.midiNote % LANE_COUNT;
                const isLong = !isTapOnlyMode && note.duration > 0.2;
                const type = (!isLong && Math.random() > 0.8) ? 'flick' : 'normal';
                
                notes.push({ 
                    ...note, 
                    lane: lane, 
                    type: type,
                    hit: false, 
                    headMissed: false,
                    tailMissed: false,
                    missed: false,
                    isLong: isLong,
                    isHolding: false,
                    holdCompleted: false
                });
            });

            // カウントダウン処理へ移行
            gameState = 'countdown';
            const countdownEl = document.getElementById('countdown-text');
            const countdownScreen = document.getElementById('countdown-screen');
            countdownScreen.classList.remove('hidden');
            
            const steps = ["3", "2", "1", "GO!"];
            let stepIdx = 0;
            
            function nextCountdown() {
                if (stepIdx < steps.length) {
                    countdownEl.textContent = steps[stepIdx];
                    countdownEl.classList.remove('opacity-0', 'scale-50');
                    countdownEl.classList.add('opacity-100', 'scale-110');
                    
                    // カウントダウンの音
                    synth.triggerAttackRelease(stepIdx === 3 ? "C5" : "C4", "8n", Tone.now());
                    
                    setTimeout(() => {
                        countdownEl.classList.remove('opacity-100', 'scale-110');
                        countdownEl.classList.add('opacity-0', 'scale-50');
                        stepIdx++;
                        setTimeout(nextCountdown, 300);
                    }, 500);
                } else {
                    countdownScreen.classList.add('hidden');
                    gameState = 'playing';
                    Tone.Transport.start(); 
                    
                    if (!animationFrameId) {
                        lastTime = performance.now();
                        loop();
                    }
                }
            }
            
            nextCountdown();
        });

        // 数値のカウントアップアニメーション用ヘルパー
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start).toLocaleString();
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.innerHTML = end.toLocaleString();
                }
            };
            window.requestAnimationFrame(step);
        }

        function endGame() {
            gameState = 'result';
            Tone.Transport.stop();
            Tone.Transport.cancel();
            
            uiGameHeader.classList.add('hidden');
            uiGameHeader.style.opacity = '0';
            uiResultScreen.classList.remove('hidden');
            
            // リザルトの数値を一旦0にセット
            document.getElementById('result-score').textContent = "0";
            document.getElementById('result-max-combo').textContent = "0";
            document.getElementById('result-perfect').textContent = "0";
            document.getElementById('result-miss').textContent = "0";
            
            // フェードインとアニメーションの開始
            setTimeout(() => { 
                uiResultScreen.style.opacity = '1'; 
                
                animateValue(document.getElementById('result-score'), 0, score, 1500);
                setTimeout(() => animateValue(document.getElementById('result-max-combo'), 0, maxCombo, 1000), 800);
                setTimeout(() => animateValue(document.getElementById('result-perfect'), 0, stats.perfect, 1000), 1200);
                setTimeout(() => animateValue(document.getElementById('result-miss'), 0, stats.miss, 1000), 1600);
            }, 50);
        }

        document.getElementById('retry-btn').addEventListener('click', () => {
            uiResultScreen.style.opacity = '0';
            setTimeout(() => {
                uiResultScreen.classList.add('hidden');
                uiStartScreen.classList.remove('hidden');
                setTimeout(() => { uiStartScreen.style.opacity = '1'; }, 50);
            }, 700);
            gameState = 'menu';
        });

        // --- 入力判定・UI更新 ---
        function updateScoreUI() {
            scoreDisplay.textContent = score.toLocaleString();
            comboDisplay.textContent = combo;
            comboDisplay.style.transform = 'scale(1.2)';
            setTimeout(() => { comboDisplay.style.transform = 'scale(1)'; }, 100);
        }

        // エフェクト生成ヘルパー（ワールド座標ベース）
        function spawnJudgeText(text, lane, color) {
            const worldX = lanesStartX + lane * laneWorldWidth + laneWorldWidth / 2;
            const p = project(worldX, 0); // 判定ライン上(Z=0)
            if (p) {
                judgeTexts.push({ text: text, x: p.x, y: p.y - 40 * p.scale, color: color, life: 1.0, vy: -40 });
            }
        }

        function spawnParticles(lane, count) {
            const worldX = lanesStartX + lane * laneWorldWidth + laneWorldWidth / 2;
            const p = project(worldX, 0);
            if (!p) return;
            const w = laneWorldWidth * p.scale;
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: p.x + (Math.random() - 0.5) * w,
                    y: p.y,
                    vx: (Math.random() - 0.5) * 500,
                    vy: (Math.random() - 1.0) * 500,
                    life: 1.0,
                    color: COLORS[lane],
                    size: (Math.random() * 4 + 2) * p.scale
                });
            }
        }

        // keydown時の判定（始点のみ）
        function handleHit(lane) {
            const now = Tone.Transport.seconds;
            // 始点が未判定かつ、判定枠内のノーツを探す
            const laneNotes = notes.filter(n => n.lane === lane && !n.hit && !n.headMissed && Math.abs(n.time - now) <= GREAT_WINDOW);
            if (laneNotes.length === 0) return;

            laneNotes.sort((a, b) => Math.abs(a.time - now) - Math.abs(b.time - now));
            const target = laneNotes[0];
            const diff = Math.abs(target.time - now);

            if (diff <= PERFECT_WINDOW) {
                target.hit = true;
                if (target.isLong) target.isHolding = true;
                const scoreAdd = target.type === 'flick' ? 1500 : 1000;
                score += scoreAdd + (combo * 10);
                combo++;
                stats.perfect++;
                spawnParticles(lane, 20);
                spawnJudgeText("PERFECT", lane, "#00ffff");
                cameraShake = 1.0;
            } else if (diff <= GREAT_WINDOW) {
                target.hit = true;
                if (target.isLong) target.isHolding = true;
                const scoreAdd = target.type === 'flick' ? 800 : 500;
                score += scoreAdd + (combo * 5);
                combo++;
                stats.great++;
                spawnParticles(lane, 10);
                spawnJudgeText("GREAT", lane, "#39ff14");
                cameraShake = 0.5;
            }
            maxCombo = Math.max(maxCombo, combo);
            updateScoreUI();
        }

        // 毎フレームの判定処理（ミス判定＆オートホールド復帰）
        function updateNoteStates(currentTime) {
            notes.forEach(note => {
                if (note.holdCompleted || note.missed) return;

                const isLaneActive = activeKeys[note.lane];
                const endTime = note.time + (note.isLong ? note.duration : 0);

                // --- 始点のミス判定 ---
                // 始点を叩かずに判定枠を過ぎてしまった場合
                if (!note.hit && !note.headMissed && currentTime > note.time + GREAT_WINDOW) {
                    note.headMissed = true;
                    if (!note.isLong) {
                        // 通常ノーツなら完全にミス
                        note.missed = true;
                        combo = 0;
                        stats.miss++;
                        spawnJudgeText("MISS", note.lane, "#ff007f");
                        updateScoreUI();
                    } else {
                        // ロングノーツの場合、始点としてはミス扱い（コンボ切れる）
                        combo = 0;
                        stats.miss++;
                        spawnJudgeText("MISS", note.lane, "#ff007f");
                        updateScoreUI();
                    }
                }

                // --- ロングノーツの帯（ホールド）判定 ---
                if (note.isLong) {
                    // 現在、帯が判定ライン上にいるかどうか
                    const isInsideBand = currentTime >= note.time && currentTime <= endTime;

                    if (isInsideBand) {
                        if (isLaneActive) {
                            // 帯の上にいて、キーが押されていれば（途中からでも）ホールド状態にする
                            note.isHolding = true;
                            score += 10;
                            if (Math.random() > 0.8) spawnParticles(note.lane, 1);
                        } else {
                            // キーが離されている
                            note.isHolding = false;
                        }
                    }

                    // 終端を過ぎた時の処理
                    if (currentTime > endTime) {
                        if (note.isHolding || isLaneActive) {
                            // 終端まで押せていれば成功
                            note.holdCompleted = true;
                            note.isHolding = false;
                            score += 1000 + (combo * 10);
                            combo++;
                            stats.perfect++;
                            spawnJudgeText("PERFECT", note.lane, "#00ffff");
                            spawnParticles(note.lane, 20);
                            updateScoreUI();
                        } else {
                            // 終端で離していた場合はミス
                            if (!note.tailMissed) {
                                note.tailMissed = true;
                                note.holdCompleted = true;
                                combo = 0;
                                stats.miss++;
                                spawnJudgeText("MISS", note.lane, "#ff007f");
                                updateScoreUI();
                            }
                        }
                        maxCombo = Math.max(maxCombo, combo);
                    }
                }
            });
        }

        // --- 入力処理（キーボード・タッチ・マウス） ---
        let kbKeys = [false, false, false, false];
        let touchKeys = [false, false, false, false];

        function updateActiveKeys() {
            for (let i = 0; i < LANE_COUNT; i++) {
                const isActive = kbKeys[i] || touchKeys[i];
                if (isActive && !activeKeys[i]) {
                    activeKeys[i] = true;
                    laneEffects[i] = 1.0;
                    keyUIs[i].classList.add('active');
                    if (gameState === 'playing') handleHit(i);
                } else if (!isActive && activeKeys[i]) {
                    activeKeys[i] = false;
                    keyUIs[i].classList.remove('active');
                }
            }
        }

        window.addEventListener('keydown', (e) => {
            const lane = KEY_MAP[e.key];
            if (lane !== undefined && !kbKeys[lane]) {
                kbKeys[lane] = true;
                updateActiveKeys();
            }
        });

        window.addEventListener('keyup', (e) => {
            const lane = KEY_MAP[e.key];
            if (lane !== undefined) {
                kbKeys[lane] = false;
                updateActiveKeys();
            }
        });

        function getLaneFromX(x) {
            const sectionWidth = width / LANE_COUNT;
            return Math.max(0, Math.min(LANE_COUNT - 1, Math.floor(x / sectionWidth)));
        }

        function handleTouch(e) {
            if (gameState !== 'playing') return;
            e.preventDefault();
            const newTouchKeys = [false, false, false, false];
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                const lane = getLaneFromX(touch.clientX);
                newTouchKeys[lane] = true;
            }
            for (let i = 0; i < LANE_COUNT; i++) {
                touchKeys[i] = newTouchKeys[i];
            }
            updateActiveKeys();
        }

        canvas.addEventListener('touchstart', handleTouch, { passive: false });
        canvas.addEventListener('touchmove', handleTouch, { passive: false });
        canvas.addEventListener('touchend', handleTouch, { passive: false });
        canvas.addEventListener('touchcancel', handleTouch, { passive: false });

        let isMouseDown = false;
        canvas.addEventListener('mousedown', (e) => {
            if (gameState !== 'playing') return;
            isMouseDown = true;
            const lane = getLaneFromX(e.clientX);
            touchKeys[lane] = true;
            updateActiveKeys();
        });
        canvas.addEventListener('mousemove', (e) => {
            if (gameState !== 'playing' || !isMouseDown) return;
            const lane = getLaneFromX(e.clientX);
            const newTouchKeys = [false, false, false, false];
            newTouchKeys[lane] = true;
            for (let i = 0; i < LANE_COUNT; i++) touchKeys[i] = newTouchKeys[i];
            updateActiveKeys();
        });
        const handleMouseUp = () => {
            isMouseDown = false;
            for (let i = 0; i < LANE_COUNT; i++) touchKeys[i] = false;
            updateActiveKeys();
        };
        canvas.addEventListener('mouseup', handleMouseUp);
        canvas.addEventListener('mouseleave', handleMouseUp);

    // --- 描画処理 (3D Perspective) ---
    function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

        // グリッド床のうねり（波）の高さ計算
        function getGridHeight(worldX, worldZ) {
            // レーンがある中央付近はプレイアビリティのために平らに保つ
            const trackWidth = LANE_COUNT * laneWorldWidth;
            const distFromTrack = Math.max(0, Math.abs(worldX) - trackWidth / 2 - 100);
            if (distFromTrack === 0) return 0;
            
            // 外側に向かって波を強くする（最大高さを themeConfig から取得）
            const maxWaveHeight = themeConfig.gridWaveHeight || 90;
            const waveStrength = Math.min(distFromTrack * 0.18, maxWaveHeight);
            
            // うねりの速度と周波数も themeConfig から取得
            const speed = themeConfig.gridWaveSpeed || 2.5;
            const freqX = themeConfig.gridWaveFreqX || 0.005;
            const freqZ = themeConfig.gridWaveFreqZ || 0.003;
            
            return Math.sin(worldX * freqX + worldZ * freqZ - bgTime * speed) * waveStrength;
        }

        function drawBackground(dt) {
            bgTime += dt;
            
            ctx.fillStyle = '#030308';
            ctx.fillRect(0, 0, width, height);

            // --- 演出同期用のビートパルス計算 ---
            const isPlaying = gameState === 'playing';
            const currentSeconds = isPlaying ? Tone.Transport.seconds : (bgTime * 1.0);
            const beatDuration = 60 / currentBpm;
            const beatPhase = (currentSeconds % beatDuration) / beatDuration;
            const pulseEffect = Math.exp(-beatPhase * 4.0); // ビートで1に立ち上がり減衰する

            const cx = width / 2;
            const cy = vanishingY;

            // --- 1. 星の描画（奥から手前へ） ---
            ctx.fillStyle = '#ffffff';
            bgStars.forEach(star => {
                // ビートに合わせて移動速度を少しブースト
                const currentSpeed = star.speedZ * (1.0 + pulseEffect * 0.5);
                star.z -= currentSpeed * dt;
                if (star.z <= 0) {
                    star.z = 2000;
                    star.x = (Math.random() - 0.5) * 2000;
                    star.y = (Math.random() - 0.5) * 1000;
                }
                
                const scale = projD / (star.z - cameraZ);
                if (scale > 0) {
                    const sx = cx + star.x * scale;
                    const sy = cy + star.y * scale;
                    
                    ctx.globalAlpha = star.alpha * Math.min(1, scale);
                    ctx.beginPath();
                    const sz = star.size * (1.0 + pulseEffect * 0.3) * scale;
                    ctx.arc(sx, sy, sz, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            ctx.globalAlpha = 1.0;

            // --- 2. ネオンレトロサン (夕日) の描画 ---
            const sunRadius = Math.min(width * 0.15, 120);
            ctx.save();
            ctx.shadowBlur = 30 + pulseEffect * 20; // ビートで発光が強くなる
            ctx.shadowColor = '#ff007f';
            
            const sunGrad = ctx.createLinearGradient(cx, cy - sunRadius, cx, cy + sunRadius * 0.5);
            sunGrad.addColorStop(0, '#ff0055');
            sunGrad.addColorStop(0.5, '#ff5500');
            sunGrad.addColorStop(1, '#ffcc00');
            ctx.fillStyle = sunGrad;
            
            ctx.beginPath();
            ctx.arc(cx, cy, sunRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            
            // サンカット (黒ラインによるスライス効果)
            ctx.fillStyle = '#030308';
            const sliceCount = 8;
            for (let i = 0; i < sliceCount; i++) {
                const sliceY = cy + (i / sliceCount) * sunRadius;
                const sliceHeight = 2 + i * 1.5;
                ctx.fillRect(cx - sunRadius - 10, sliceY, (sunRadius + 10) * 2, sliceHeight);
            }

            // --- 3. ワイヤーフレームマウンテン (サイバー山脈) ---
            ctx.save();
            ctx.lineWidth = 1.5;
            
            // 左奥の山
            ctx.shadowBlur = 8; ctx.shadowColor = '#ff007f';
            ctx.strokeStyle = '#ff007f';
            ctx.fillStyle = '#030308';
            ctx.beginPath();
            ctx.moveTo(0, cy);
            ctx.lineTo(cx * 0.25, cy - 90);
            ctx.lineTo(cx * 0.45, cy - 30);
            ctx.lineTo(cx * 0.65, cy);
            ctx.closePath();
            ctx.fill(); ctx.stroke();
            
            // 右奥の山
            ctx.shadowColor = '#00e5ff'; ctx.strokeStyle = '#00e5ff';
            ctx.beginPath();
            ctx.moveTo(cx * 1.35, cy);
            ctx.lineTo(cx * 1.55, cy - 100);
            ctx.lineTo(cx * 1.75, cy - 40);
            ctx.lineTo(width, cy);
            ctx.closePath();
            ctx.fill(); ctx.stroke();
            
            // 手前の重ね合わせ (左中)
            ctx.shadowColor = '#39ff14'; ctx.strokeStyle = '#39ff14';
            ctx.beginPath();
            ctx.moveTo(0, cy);
            ctx.lineTo(cx * 0.15, cy - 120);
            ctx.lineTo(cx * 0.35, cy - 50);
            ctx.lineTo(cx * 0.5, cy);
            ctx.closePath();
            ctx.fill(); ctx.stroke();
            
            // 山のサイバーグリッド装飾線
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.beginPath();
            ctx.moveTo(cx * 0.15, cy - 120); ctx.lineTo(cx * 0.15, cy);
            ctx.moveTo(cx * 0.25, cy - 90); ctx.lineTo(cx * 0.25, cy);
            ctx.moveTo(cx * 1.55, cy - 100); ctx.lineTo(cx * 1.55, cy);
            ctx.stroke();
            ctx.restore();

            // --- 4. 波打つサイバーグリッド床 ---
            const gridZSpacing = 200;
            const gridXSpacing = 200;
            const gridSpeed = NOTE_SPEED * 0.4;
            const gridOffsetZ = (bgTime * gridSpeed) % gridZSpacing;
            
            const baseGridColor = themeConfig.secondaryColor || '#00e5ff';
            
            // 縦線
            ctx.lineWidth = 1 + pulseEffect * 0.5;
            for (let x = -4000; x <= 4000; x += gridXSpacing) {
                ctx.strokeStyle = hexToRgba(baseGridColor, 0.12 + pulseEffect * 0.08);
                ctx.beginPath();
                let first = true;
                for (let z = 4000; z >= -200; z -= 200) {
                    const y = getGridHeight(x, z);
                    const p = project(x, z, y);
                    if (p) {
                        if (first) {
                            ctx.moveTo(p.x, p.y);
                            first = false;
                        } else {
                            ctx.lineTo(p.x, p.y);
                        }
                    }
                }
                ctx.stroke();
            }
            
            // 横線（奥から手前に流れるスキャンパルスの演出）
            for (let z = 0; z < 4000; z += gridZSpacing) {
                const actualZ = z - gridOffsetZ;
                if (actualZ < -200) continue;
                
                // 奥から手前に走る光の波（周期1200、幅250ピクセル）
                const wavePhase = (actualZ + bgTime * NOTE_SPEED * 0.8) % 1200;
                const scanHighlight = wavePhase < 250 ? (1 - wavePhase / 250) : 0;
                
                ctx.lineWidth = (1 + pulseEffect * 0.5) * (1.0 + scanHighlight * 1.8);
                ctx.strokeStyle = hexToRgba(baseGridColor, 0.12 + pulseEffect * 0.08 + scanHighlight * 0.38);
                
                ctx.beginPath();
                let first = true;
                for (let x = -4000; x <= 4000; x += 200) {
                    const y = getGridHeight(x, actualZ);
                    const p = project(x, actualZ, y);
                    if (p) {
                        if (first) {
                            ctx.moveTo(p.x, p.y);
                            first = false;
                        } else {
                            ctx.lineTo(p.x, p.y);
                        }
                    }
                }
                ctx.stroke();
            }

            // 脈動するグリッド交点ドット (Intersection Dots) の描画
            ctx.save();
            const dotColor = themeConfig.primaryColor || '#ff007f';
            const trackWidth = LANE_COUNT * laneWorldWidth;
            for (let z = 200; z <= 2400; z += 200) {
                // 手前のZのみ表示（パフォーマンス向上のため）
                const actualZ = z - gridOffsetZ;
                if (actualZ < 0 || actualZ > 2400) continue;

                const scale = projD / (actualZ - cameraZ);
                if (scale <= 0) continue;

                // ビートで拡大・発光するサイズ
                const dotRadius = (1.5 + pulseEffect * 2.5) * scale;
                ctx.fillStyle = hexToRgba(dotColor, 0.25 + pulseEffect * 0.55);

                for (let x = -3000; x <= 3000; x += 200) {
                    // レーン中央付近は描画しない（プレイエリアを邪魔しないようにする）
                    if (Math.abs(x) < trackWidth / 2 + 100) continue;

                    const y = getGridHeight(x, actualZ);
                    const p = project(x, actualZ, y);
                    if (p) {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, dotRadius, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            ctx.restore();

            // ネオン境界線（ガードレール）の描画
            ctx.save();
            const guardrailColor = themeConfig.primaryColor || '#ff007f';
            const trackWidthVal = LANE_COUNT * laneWorldWidth;
            const boundaryX1 = lanesStartX;
            const boundaryX2 = lanesStartX + trackWidthVal;
            
            // ネオン発光効果の設定
            ctx.shadowBlur = 12 + pulseEffect * 12;
            ctx.shadowColor = guardrailColor;
            ctx.globalCompositeOperation = 'screen';
            
            // 左側と右側の境界線をそれぞれ太線（ぼかし）と細線（芯）で二重描画してネオン感を出す
            [boundaryX1, boundaryX2].forEach(bx => {
                // 1回目：太い半透明の線（光の広がり）
                ctx.lineWidth = 6 + pulseEffect * 2;
                ctx.strokeStyle = hexToRgba(guardrailColor, 0.4 + pulseEffect * 0.2);
                ctx.beginPath();
                let first = true;
                for (let z = 4000; z >= -400; z -= 100) {
                    const y = getGridHeight(bx, z);
                    const p = project(bx, z, y);
                    if (p) {
                        if (first) {
                            ctx.moveTo(p.x, p.y);
                            first = false;
                        } else {
                            ctx.lineTo(p.x, p.y);
                        }
                    }
                }
                ctx.stroke();

                // 2回目：細い芯の線
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#ffffff'; // 芯は白くすることで強い発光感を出す
                ctx.beginPath();
                first = true;
                for (let z = 4000; z >= -400; z -= 100) {
                    const y = getGridHeight(bx, z);
                    const p = project(bx, z, y);
                    if (p) {
                        if (first) {
                            ctx.moveTo(p.x, p.y);
                            first = false;
                        } else {
                            ctx.lineTo(p.x, p.y);
                        }
                    }
                }
                ctx.stroke();
            });
            ctx.restore();

            // --- 5. 地平線のイコライザー風レーザー (ビートシンク) ---
            const pulse = (Math.sin(bgTime * 8) + 1) / 2;
            
            ctx.globalCompositeOperation = 'screen';
            for (let i = -8; i <= 8; i++) {
                if (i === 0) continue;
                
                const lx = (i * width / 16) + cx;
                const ly = vanishingY;
                
                const activePulse = isPlaying ? Math.random() : pulse;
                const lHeight = 30 + activePulse * 150 + (Math.abs(i) * 10) + (pulseEffect * 80);
                
                const gradLaser = ctx.createLinearGradient(0, ly, 0, ly - lHeight);
                const rColor = i % 2 === 0 ? '255, 0, 127' : '0, 229, 255';
                
                gradLaser.addColorStop(0, `rgba(${rColor}, 0.8)`);
                gradLaser.addColorStop(1, `rgba(${rColor}, 0)`);
                
                ctx.fillStyle = gradLaser;
                ctx.beginPath();
                const laserWidth = Math.max(1, 15 - Math.abs(i));
                ctx.moveTo(lx - laserWidth, ly);
                ctx.lineTo(lx + laserWidth, ly);
                ctx.lineTo(lx + laserWidth/4, ly - lHeight);
                ctx.lineTo(lx - laserWidth/4, ly - lHeight);
                ctx.fill();
            }
            ctx.globalCompositeOperation = 'source-over';

            // --- 6. 地平線の発光ライン ---
            const grad = ctx.createLinearGradient(0, vanishingY - 30, 0, vanishingY + 50);
            grad.addColorStop(0, 'rgba(0, 229, 255, 0)');
            grad.addColorStop(0.5, 'rgba(0, 229, 255, 0.4)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, vanishingY - 30, width, 80);
            
            ctx.shadowBlur = 10 + pulseEffect * 15;
            ctx.shadowColor = '#00e5ff';
            ctx.strokeStyle = '#00e5ff';
            ctx.lineWidth = 2 + pulseEffect * 1.5;
            ctx.beginPath();
            ctx.moveTo(0, vanishingY);
            ctx.lineTo(width, vanishingY);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function drawLanes(dt) {
            const maxZ = 6000;
            const minZ = -400; // 判定ラインより少し手前まで描画
            
            // ビートパルスの計算
            const isPlaying = gameState === 'playing';
            const currentSeconds = isPlaying ? Tone.Transport.seconds : (bgTime * 1.0);
            const beatDuration = 60 / currentBpm;
            const beatPhase = (currentSeconds % beatDuration) / beatDuration;
            const pulseEffect = Math.exp(-beatPhase * 4.0);

            ctx.globalCompositeOperation = 'screen';

            for (let i = 0; i < LANE_COUNT; i++) {
                const wx1 = lanesStartX + i * laneWorldWidth;
                const wx2 = wx1 + laneWorldWidth;
                
                const pBackL = project(wx1, maxZ);
                const pBackR = project(wx2, maxZ);
                const pFrontL = project(wx1, minZ);
                const pFrontR = project(wx2, minZ);
                
                if (!pBackL || !pFrontL) continue;

                // レーン背景 (うっすらビートに合わせて明滅する)
                ctx.fillStyle = `rgba(20, 20, 40, ${0.25 + pulseEffect * 0.08})`;
                ctx.beginPath();
                ctx.moveTo(pBackL.x, pBackL.y);
                ctx.lineTo(pBackR.x, pBackR.y);
                ctx.lineTo(pFrontR.x, pFrontR.y);
                ctx.lineTo(pFrontL.x, pFrontL.y);
                ctx.fill();

                // 境界線
                ctx.strokeStyle = 'rgba(0, 229, 255, 0.15)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // キー押下時の発光
                if (laneEffects[i] > 0) {
                    const pHit = project(wx1, 0);
                    if (pHit) {
                        const grad = ctx.createLinearGradient(0, pHit.y, 0, vanishingY);
                        grad.addColorStop(0, hexToRgba(COLORS[i], laneEffects[i] * 0.6));
                        grad.addColorStop(1, 'rgba(0,0,0,0)');
                        
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.moveTo(pBackL.x, pBackL.y);
                        ctx.lineTo(pBackR.x, pBackR.y);
                        ctx.lineTo(pFrontR.x, pFrontR.y);
                        ctx.lineTo(pFrontL.x, pFrontL.y);
                        ctx.fill();
                    }
                    if (!activeKeys[i]) laneEffects[i] = Math.max(0, laneEffects[i] - dt * 5);
                }
            }

            // 判定ライン (Z = 0)
            const pHitLeft = project(lanesStartX, 0);
            const pHitRight = project(lanesStartX + LANE_COUNT * laneWorldWidth, 0);
            if (pHitLeft && pHitRight) {
                ctx.shadowBlur = 15 + pulseEffect * 10;
                ctx.shadowColor = '#fff';
                ctx.strokeStyle = `rgba(255, 255, 255, ${0.8 + pulseEffect * 0.2})`;
                ctx.lineWidth = 4 + pulseEffect * 1.5;
                ctx.beginPath();
                ctx.moveTo(pHitLeft.x, pHitLeft.y);
                ctx.lineTo(pHitRight.x, pHitRight.y);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
            
            ctx.globalCompositeOperation = 'source-over';
        }

        function drawNotes(currentTime) {
            ctx.globalCompositeOperation = 'screen';

            // Zが大きい(奥)から描画するためにソート
            const visibleNotes = notes.filter(n => !n.missed && !n.holdCompleted && (n.isLong || !n.hit));
            visibleNotes.sort((a, b) => {
                const zA = a.isHolding ? 0 : (a.time - currentTime) * NOTE_SPEED;
                const zB = b.isHolding ? 0 : (b.time - currentTime) * NOTE_SPEED;
                return zB - zA;
            });

            for (let i = 0; i < visibleNotes.length; i++) {
                const note = visibleNotes[i];
                
                const timeDiff = note.time - currentTime;
                let z = timeDiff * NOTE_SPEED;
                if (note.isHolding) z = 0;

                if (z > 10000 || z < -500) continue; // 描画範囲外

                // ノーツの横幅のパディングを割合で計算
                const padding = laneWorldWidth * 0.08;
                const wx1 = lanesStartX + note.lane * laneWorldWidth + padding;
                const wx2 = lanesStartX + (note.lane + 1) * laneWorldWidth - padding;

                // ロングノーツの帯を描画
                if (note.isLong) {
                    const endTimeDiff = (note.time + note.duration) - currentTime;
                    const endZ = endTimeDiff * NOTE_SPEED;
                    
                    if (endZ > z) {
                        const p1 = project(wx1, z);
                        const p2 = project(wx2, z);
                        const p3 = project(wx2, endZ);
                        const p4 = project(wx1, endZ);
                        
                        if (p1 && p2 && p3 && p4) {
                            ctx.globalAlpha = note.isHolding ? 0.9 : 0.6;
                            ctx.fillStyle = COLORS[note.lane];
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.lineTo(p3.x, p3.y);
                            ctx.lineTo(p4.x, p4.y);
                            ctx.fill();
                            
                            ctx.strokeStyle = '#ffffff';
                            ctx.lineWidth = 1;
                            ctx.stroke();
                            ctx.globalAlpha = 1.0;

                            // 結合された元のノーツの区切り（節）を描画
                            if (note.subNotes && note.subNotes.length > 0) {
                                note.subNotes.forEach(subTime => {
                                    const subTimeDiff = subTime - currentTime;
                                    let subZ = subTimeDiff * NOTE_SPEED;
                                    
                                    // 判定ラインを過ぎた節は描画しない（ホールド中のため）
                                    if (subZ < 0) return;
                                    if (subZ > 10000 || subZ < -500) return;

                                    const pSubL = project(wx1, subZ);
                                    const pSubR = project(wx2, subZ);

                                    if (pSubL && pSubR) {
                                        ctx.shadowBlur = 10 * pSubL.scale;
                                        ctx.shadowColor = COLORS[note.lane];
                                        ctx.strokeStyle = '#ffffff';
                                        ctx.lineWidth = Math.max(1, 3 * pSubL.scale);
                                        ctx.beginPath();
                                        ctx.moveTo(pSubL.x, pSubL.y);
                                        ctx.lineTo(pSubR.x, pSubR.y);
                                        ctx.stroke();
                                        ctx.shadowBlur = 0;
                                    }
                                });
                            }
                        }
                    }
                }

                // ノーツの頭を描画
                if (!note.hit || note.isHolding) {
                    const isFlick = note.type === 'flick';
                    const drawColor = isFlick ? '#ff003c' : COLORS[note.lane];

                    const p = project(lanesStartX + note.lane * laneWorldWidth + laneWorldWidth/2, z);
                    
                    if (p) {
                        const scale = p.scale;
                        const noteW = (laneWorldWidth - padding * 2) * scale;
                        const noteH = 24 * scale;
                        const px = p.x - noteW / 2;
                        const py = p.y - noteH / 2;

                        ctx.shadowBlur = 20 * scale;
                        ctx.shadowColor = drawColor;
                        
                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.roundRect(px, py, noteW, noteH, 8 * scale);
                        ctx.fill();

                        ctx.shadowBlur = 0;
                        ctx.fillStyle = drawColor;
                        ctx.beginPath();
                        ctx.roundRect(px + 2*scale, py + 2*scale, noteW - 4*scale, noteH - 4*scale, 6 * scale);
                        ctx.fill();

                        if (isFlick) {
                            ctx.fillStyle = '#ffffff';
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y - noteH/4 - 4*scale);
                            ctx.lineTo(p.x - 8*scale, p.y + noteH/4 - 2*scale);
                            ctx.lineTo(p.x + 8*scale, p.y + noteH/4 - 2*scale);
                            ctx.fill();
                        }
                    }
                }
            }
            ctx.globalCompositeOperation = 'source-over';
        }

        function updateAndDrawEffects(dt) {
            ctx.globalCompositeOperation = 'screen';

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.vy += 1500 * dt;
                p.life -= dt * 1.5;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw a beautiful shooting spark laser trail!
                ctx.strokeStyle = p.color;
                ctx.lineWidth = p.size * 0.8;
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x - p.vx * 0.04, p.y - p.vy * 0.04);
                ctx.stroke();
            }
            ctx.shadowBlur = 0;

            ctx.textAlign = "center";
            ctx.font = "900 28px Orbitron";
            for (let i = judgeTexts.length - 1; i >= 0; i--) {
                let jt = judgeTexts[i];
                jt.y += jt.vy * dt;
                jt.life -= dt * 1.5;

                if (jt.life <= 0) {
                    judgeTexts.splice(i, 1);
                    continue;
                }

                ctx.globalAlpha = jt.life;
                ctx.fillStyle = jt.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = jt.color;
                ctx.fillText(jt.text, jt.x, jt.y);
            }
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1.0;
            ctx.globalCompositeOperation = 'source-over';
        }

        function loop() {
            animationFrameId = requestAnimationFrame(loop);
            const timeNow = performance.now();
            const dt = (timeNow - lastTime) / 1000;
            lastTime = timeNow;

            if (cameraShake > 0) {
                cameraShake = Math.max(0, cameraShake - dt * 4.0);
            }

            drawBackground(dt);

            if (gameState === 'playing' || gameState === 'countdown') {
                // カウントダウン中もレーンを描画し、背景と一緒に進んでいるように見せる
                drawLanes(dt);
                
                // カウントダウン中は Tone.Transport.seconds が 0 なのでノーツは奥で待機
                const currentTime = gameState === 'playing' ? Tone.Transport.seconds : 0;
                
                // 残り時間の計算と表示
                const speed = parseFloat(document.getElementById('speed-slider').value) || 1.0;
                const totalSeconds = (loadedMidi.duration / speed) + 2.0; // 猶予時間2秒を含む
                const remaining = Math.max(0, totalSeconds - currentTime);
                document.getElementById('time-display').textContent = formatTime(remaining);
                
                if (gameState === 'playing') {
                    updateNoteStates(currentTime);
                }
                
                // カウントダウン中もノーツを描画する（初期位置に表示される）
                drawNotes(currentTime);
                updateAndDrawEffects(dt);

                if (gameState === 'playing') {
                    if (notes.length > 0) {
                        const lastNoteTime = notes[notes.length - 1].time + (notes[notes.length - 1].isLong ? notes[notes.length - 1].duration : 0);
                        if (currentTime > lastNoteTime + 2.0) endGame();
                    } else {
                        const speed = parseFloat(document.getElementById('speed-slider').value);
                        const anyTrackEnd = loadedMidi.duration / speed;
                        if (currentTime > anyTrackEnd + 2.0) endGame();
                    }
                }
            } else if (gameState === 'menu' || gameState === 'result') {
                updateAndDrawEffects(dt);
            }
        }

        // 初期化
        resize();
        
        // メニュー画面表示時から背景アニメーションを開始
        if (!animationFrameId) {
            lastTime = performance.now();
            loop();
        }
        
        // Canvas roundRect Polyfill
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.beginPath();
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath();
                return this;
            }
        }
    </script>
</body>
