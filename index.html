<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Beat - MIDI Rhythm Game</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tone.js (Web Audio APIラッパー) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <!-- Tone.js MIDIパーサー -->
    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28/build/Midi.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            background-color: #050510;
            color: white;
            user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        .glass-panel {
            background: rgba(10, 10, 20, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.1);
        }
        .neon-text-pink {
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #ff007f, 0 0 30px #ff007f, 0 0 40px #ff007f;
        }
        .neon-text-blue {
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #00e5ff, 0 0 30px #00e5ff, 0 0 40px #00e5ff;
        }
        .neon-border-blue {
            border-color: #00e5ff;
            box-shadow: 0 0 10px #00e5ff, inset 0 0 10px #00e5ff;
        }
        /* キーボード風ボタンのアニメーション用 */
        .key-btn {
            transition: all 0.1s;
        }
        .key-btn.active {
            transform: scale(0.95);
            background-color: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }
        /* スクロールバーの装飾 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0, 229, 255, 0.5); 
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- UIレイヤー -->
    <div id="ui-layer" class="absolute inset-0 z-10 pointer-events-none flex flex-col justify-between p-6 md:p-10">
        
        <!-- ヘッダー（プレイ中のみ表示） -->
        <div id="game-header" class="flex justify-between items-start hidden transition-opacity duration-500">
            <div>
                <p class="text-sm md:text-lg text-[#00e5ff] tracking-widest mb-[-5px]">SCORE / スコア</p>
                <p class="text-4xl md:text-6xl font-black text-white drop-shadow-[0_0_10px_rgba(0,229,255,0.8)]" id="score-display">0</p>
            </div>
            <div class="text-center">
                <p class="text-sm md:text-lg text-gray-400 tracking-widest mb-[-5px]">TIME / 残り時間</p>
                <p class="text-3xl md:text-5xl font-mono font-bold text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]" id="time-display">0:00</p>
            </div>
            <div class="text-right">
                <p class="text-sm md:text-lg text-[#ff007f] tracking-widest mb-[-5px]">COMBO / コンボ</p>
                <p class="text-5xl md:text-7xl font-black text-white drop-shadow-[0_0_15px_rgba(255,0,127,0.8)]" id="combo-display">0</p>
            </div>
        </div>

        <!-- カウントダウン画面 -->
        <div id="countdown-screen" class="absolute inset-0 flex items-center justify-center z-50 pointer-events-none hidden">
            <p id="countdown-text" class="text-8xl md:text-9xl font-black text-transparent bg-clip-text bg-gradient-to-b from-[#00e5ff] to-[#ff007f] drop-shadow-[0_0_20px_rgba(0,229,255,0.8)] scale-50 opacity-0 transition-all duration-300"></p>
        </div>

        <!-- スタート画面 -->
        <div id="start-screen" class="absolute inset-0 flex items-center justify-center pointer-events-auto transition-opacity duration-500">
            <div class="glass-panel p-6 md:p-10 rounded-3xl flex flex-col items-center max-w-lg w-full text-center mx-4 relative overflow-hidden max-h-[95vh] overflow-y-auto custom-scrollbar">
                <!-- 装飾ライン -->
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#ff007f] via-[#00e5ff] to-[#ff007f]"></div>
                
                <h1 class="text-4xl md:text-5xl font-black mb-1 tracking-wider neon-text-blue mt-2">NEON BEAT</h1>
                <p class="text-gray-400 mb-6 tracking-[0.3em] text-xs">WEB MIDI RHYTHM GAME - 3D MODE</p>
                
                <!-- ファイルドロップゾーン -->
                <div class="w-full border-2 border-dashed border-gray-600 rounded-xl p-6 mb-4 hover:border-[#00e5ff] hover:bg-[#00e5ff]/5 transition-all cursor-pointer relative group flex-shrink-0" id="drop-zone">
                    <input type="file" id="midi-upload" accept=".mid,.midi" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                    <div class="flex flex-col items-center pointer-events-none transition-transform group-hover:scale-105">
                        <svg class="w-10 h-10 mb-2 text-gray-400 group-hover:text-[#00e5ff] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        <p class="text-base font-bold text-gray-200">ここにMIDIファイルをドロップ</p>
                        <p class="text-xs text-gray-500 mt-1">またはクリックしてファイルを選択</p>
                    </div>
                </div>

                <!-- サンプル曲選択セクション -->
                <div id="sample-section" class="w-full mb-4 flex-shrink-0 flex flex-col gap-2 pointer-events-auto">
                    <label class="block text-xs text-[#00e5ff] tracking-widest text-left font-bold border-b border-[#00e5ff]/30 pb-1">サンプル曲の選択</label>
                    <div class="flex gap-2 w-full">
                        <select id="sample-song-select" class="flex-grow bg-gray-800/60 border border-gray-600 rounded-xl p-3 text-sm text-[#00e5ff] font-bold focus:outline-none focus:border-[#00e5ff] cursor-pointer hover:bg-gray-700/50 transition">
                            <option value="neon_beat" class="bg-gray-900 text-[#00e5ff]">Neon Beat Theme (オリジナル曲)</option>
                            <option value="neon_highway" class="bg-gray-900 text-[#00e5ff]">Neon Highway (チル・シンセウェーブ)</option>
                            <option value="cyber_runner" class="bg-gray-900 text-[#00e5ff]">Cyber Runner (高速サイバーパンク)</option>
                            <option value="retro_future" class="bg-gray-900 text-[#00e5ff]">Retro Future (アップビート・エレクトロ)</option>
                        </select>
                        <button id="play-sample-btn" class="px-5 rounded-xl font-bold text-sm bg-[#00e5ff]/20 border border-[#00e5ff] text-[#00e5ff] hover:bg-[#00e5ff]/30 transition-all flex items-center justify-center gap-1.5 flex-shrink-0">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path></svg>
                            読み込み
                        </button>
                    </div>
                </div>

                <!-- セットアップパネル (初期非表示) -->
                <div id="setup-panel" class="hidden w-full mb-4 bg-black/40 p-4 rounded-xl border border-gray-700 flex-shrink-0">
                    <div class="mb-4">
                        <p class="text-xs text-[#00e5ff] tracking-widest mb-2 text-left font-bold border-b border-[#00e5ff]/30 pb-1">トラックの選択</p>
                        <div id="track-list" class="flex flex-col gap-1.5 max-h-32 overflow-y-auto text-left text-sm text-gray-300 custom-scrollbar pr-2">
                            <!-- トラックリストがここに生成されます -->
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <p class="text-xs text-[#00e5ff] tracking-widest mb-2 text-left font-bold border-b border-[#00e5ff]/30 pb-1">使用する楽器</p>
                        <select id="instrument-select" class="w-full bg-gray-800/50 border border-gray-600 rounded p-2 text-sm text-[#39ff14] font-bold focus:outline-none focus:border-[#00e5ff] cursor-pointer hover:bg-gray-700/50 transition">
                            <option value="synth">基本シンセ (Basic Synth)</option>
                            <option value="fmsynth">FMシンセ (FM Synth - Electronic)</option>
                            <option value="amsynth">AMシンセ (AM Synth - Retro)</option>
                            <option value="duosynth">Duoシンセ (Duo Synth - Thick)</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <p class="text-xs text-[#00e5ff] tracking-widest mb-2 text-left font-bold border-b border-[#00e5ff]/30 pb-1">ゲームモード</p>
                        <select id="game-mode-select" class="w-full bg-gray-800/50 border border-gray-600 rounded p-2 text-sm text-white font-bold focus:outline-none focus:border-[#00e5ff] cursor-pointer hover:bg-gray-700/50 transition">
                            <option value="normal">ノーマルモード</option>
                            <option value="easy">イージーモード (ロングノーツのみ)</option>
                            <option value="tap">タップ専用モード (ロングノーツなし)</option>
                        </select>
                    </div>

                    <!-- 演奏目安時間表示 -->
                    <div class="mb-4 text-left text-sm text-gray-300 flex items-center justify-between border-b border-[#00e5ff]/30 pb-2">
                        <span class="text-xs text-[#00e5ff] tracking-widest font-bold">演奏目安時間</span>
                        <span id="duration-display" class="font-bold text-white font-mono text-base">-</span>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <p class="text-xs text-[#ff007f] tracking-widest text-left font-bold">再生速度 (テンポ)</p>
                            <p class="text-sm text-white font-black" id="speed-display">1.0x</p>
                        </div>
                        <input type="range" id="speed-slider" min="0.1" max="2.0" step="0.1" value="1.0" class="w-full accent-[#ff007f] cursor-pointer">
                    </div>
                </div>
                
                <div class="text-sm text-[#00e5ff] mb-4 h-6 font-bold flex justify-center items-center gap-2" id="file-name"></div>
                
                <!-- スタートボタン -->
                <button id="start-btn" class="w-full py-4 rounded-xl font-bold text-xl bg-gradient-to-r from-[#00e5ff] to-[#ff007f] text-white opacity-50 cursor-not-allowed transition-all transform hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(255,0,127,0.4)] hover:shadow-[0_0_30px_rgba(0,229,255,0.6)] flex-shrink-0" disabled>
                    ゲームスタート
                </button>

                <!-- 操作説明 -->
                <div class="mt-6 text-left w-full flex-shrink-0">
                    <p class="mb-3 text-xs text-gray-400 tracking-widest text-center">操作キー設定</p>
                    <div class="flex justify-center gap-4">
                        <div class="key-btn w-12 h-12 border border-gray-600 rounded-lg flex items-center justify-center font-bold text-xl text-gray-300" id="key-ui-0">D</div>
                        <div class="key-btn w-12 h-12 border border-gray-600 rounded-lg flex items-center justify-center font-bold text-xl text-gray-300" id="key-ui-1">F</div>
                        <div class="key-btn w-12 h-12 border border-gray-600 rounded-lg flex items-center justify-center font-bold text-xl text-gray-300" id="key-ui-2">J</div>
                        <div class="key-btn w-12 h-12 border border-gray-600 rounded-lg flex items-center justify-center font-bold text-xl text-gray-300" id="key-ui-3">K</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- リザルト画面 -->
        <div id="result-screen" class="absolute inset-0 flex items-center justify-center pointer-events-auto hidden bg-black/80 backdrop-blur-md opacity-0 transition-opacity duration-700">
            <div class="glass-panel neon-border-blue p-10 rounded-3xl flex flex-col items-center max-w-lg w-full text-center mx-4">
                <h2 class="text-4xl md:text-5xl font-black mb-2 text-white drop-shadow-[0_0_10px_#00e5ff]">トラッククリア！</h2>
                <p class="text-gray-400 mb-8 tracking-widest">RESULTS</p>
                
                <div class="grid grid-cols-2 gap-x-12 gap-y-6 w-full mb-10 text-left border-y border-gray-700 py-6">
                    <div>
                        <p class="text-xs text-gray-400 tracking-widest">SCORE / スコア</p>
                        <p class="text-3xl font-bold text-white drop-shadow-[0_0_5px_#00e5ff]" id="result-score">0</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400 tracking-widest">MAX COMBO / 最大コンボ</p>
                        <p class="text-3xl font-bold text-white drop-shadow-[0_0_5px_#ff007f]" id="result-max-combo">0</p>
                    </div>
                    <div>
                        <p class="text-xs text-[#39ff14] tracking-widest">PERFECT</p>
                        <p class="text-2xl font-bold text-white" id="result-perfect">0</p>
                    </div>
                    <div>
                        <p class="text-xs text-red-500 tracking-widest">MISS</p>
                        <p class="text-2xl font-bold text-gray-400" id="result-miss">0</p>
                    </div>
                </div>
                
                <button id="retry-btn" class="px-8 py-4 rounded-xl font-bold text-lg border-2 border-[#00e5ff] text-[#00e5ff] hover:bg-[#00e5ff] hover:text-black transition-all hover:shadow-[0_0_20px_#00e5ff] w-full">
                    曲を選び直す
                </button>
            </div>
        </div>
    </div>

    <!-- 描画用キャンバス -->
    <canvas id="game-canvas" class="absolute inset-0 z-0"></canvas>

    <script>
        /**
         * Neon Beat - Game Logic (3D Perspective & Improved Hit Detection)
         */
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        // UI Elements
        const uiStartScreen = document.getElementById('start-screen');
        const uiGameHeader = document.getElementById('game-header');
        const uiResultScreen = document.getElementById('result-screen');
        const fileInput = document.getElementById('midi-upload');
        const fileNameDisplay = document.getElementById('file-name');
        const startBtn = document.getElementById('start-btn');
        const dropZone = document.getElementById('drop-zone');
        const playSampleBtn = document.getElementById('play-sample-btn');
        const sampleSection = document.getElementById('sample-section');
        const setupPanel = document.getElementById('setup-panel');
        const scoreDisplay = document.getElementById('score-display');
        const comboDisplay = document.getElementById('combo-display');
        const keyUIs = [
            document.getElementById('key-ui-0'),
            document.getElementById('key-ui-1'),
            document.getElementById('key-ui-2'),
            document.getElementById('key-ui-3')
        ];

        // Constants
        const KEY_MAP = { 'd': 0, 'f': 1, 'j': 2, 'k': 3, 'D': 0, 'F': 1, 'J': 2, 'K': 3 };
        const COLORS = ['#ff007f', '#00e5ff', '#39ff14', '#ffff00'];
        const LANE_COUNT = 4;
        let NOTE_SPEED = 2000; // Z軸方向の移動速度
        const PERFECT_WINDOW = 0.08;
        const GREAT_WINDOW = 0.15;

        // 3D Perspective Constants
        let vanishingY, yOffset;
        let cameraZ = -500;
        let projD = 500;
        let laneWorldWidth = 120;
        let lanesStartX = - (LANE_COUNT * 120) / 2;

        // Game State
        let gameState = 'menu';
        let notes = [];
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let stats = { perfect: 0, great: 0, miss: 0 };
        let loadedMidi = null;
        let activeKeys = [false, false, false, false];
        let laneEffects = [0, 0, 0, 0];
        let particles = [];
        let judgeTexts = [];
        let synth = null;
        let bgStars = [];
        let lastTime = 0;
        let animationFrameId = null;
        let bgTime = 0; // 背景アニメーション用の時間変数
        let currentBpm = 120; // 演出同期用のテンポ
        let cameraShake = 0.0; // カメラ揺れ効果用

        let themeConfig = {
            primaryColor: '#ff007f',
            secondaryColor: '#00e5ff',
            mountainColors: ['#ff007f', '#00e5ff', '#39ff14'],
            sunColors: ['#ff0055', '#ff5500', '#ffcc00'],
            starSpeedMultiplier: 1.0,
            gridWaveSpeed: 2.5,
            gridWaveHeight: 90,
            gridWaveFreqX: 0.005,
            gridWaveFreqZ: 0.003,
            laserColors: ['255, 0, 127', '0, 229, 255'],
            horizonColor: '#00e5ff'
        };

        function applyTheme(songKey) {
            if (songKey === 'neon_highway') {
                themeConfig = {
                    primaryColor: '#8a2be2',
                    secondaryColor: '#ff00ff',
                    mountainColors: ['#8a2be2', '#ff00ff', '#00e5ff'],
                    sunColors: ['#4b0082', '#8a2be2', '#da70d6'],
                    starSpeedMultiplier: 0.4,
                    gridWaveSpeed: 1.2,
                    gridWaveHeight: 50,
                    gridWaveFreqX: 0.003,
                    gridWaveFreqZ: 0.002,
                    laserColors: ['138, 43, 226', '255, 0, 255'],
                    horizonColor: '#ff00ff'
                };
                COLORS[0] = '#8a2be2'; COLORS[1] = '#ff00ff'; COLORS[2] = '#00e5ff'; COLORS[3] = '#da70d6';
                currentBpm = 110;
            } else if (songKey === 'cyber_runner') {
                themeConfig = {
                    primaryColor: '#ff003c',
                    secondaryColor: '#ffaa00',
                    mountainColors: ['#ff003c', '#ffaa00', '#ff0000'],
                    sunColors: ['#ff0000', '#ff3c00', '#ffaa00'],
                    starSpeedMultiplier: 2.5,
                    gridWaveSpeed: 4.5,
                    gridWaveHeight: 120,
                    gridWaveFreqX: 0.009,
                    gridWaveFreqZ: 0.005,
                    laserColors: ['255, 0, 60', '255, 170, 0'],
                    horizonColor: '#ff003c'
                };
                COLORS[0] = '#ff003c'; COLORS[1] = '#ffaa00'; COLORS[2] = '#ff0000'; COLORS[3] = '#ff5500';
                currentBpm = 135;
            } else if (songKey === 'retro_future') {
                themeConfig = {
                    primaryColor: '#39ff14',
                    secondaryColor: '#ffff00',
                    mountainColors: ['#39ff14', '#ffff00', '#00e5ff'],
                    sunColors: ['#00ffcc', '#39ff14', '#ffff00'],
                    starSpeedMultiplier: 1.2,
                    gridWaveSpeed: 3.0,
                    gridWaveHeight: 80,
                    gridWaveFreqX: 0.008,
                    gridWaveFreqZ: 0.004,
                    laserColors: ['57, 255, 20', '255, 255, 0'],
                    horizonColor: '#39ff14'
                };
                COLORS[0] = '#39ff14'; COLORS[1] = '#ffff00'; COLORS[2] = '#00ffcc'; COLORS[3] = '#00e5ff';
                currentBpm = 120;
            } else {
                themeConfig = {
                    primaryColor: '#ff007f',
                    secondaryColor: '#00e5ff',
                    mountainColors: ['#ff007f', '#00e5ff', '#39ff14'],
                    sunColors: ['#ff0055', '#ff5500', '#ffcc00'],
                    starSpeedMultiplier: 1.0,
                    gridWaveSpeed: 2.5,
                    gridWaveHeight: 90,
                    gridWaveFreqX: 0.005,
                    gridWaveFreqZ: 0.003,
                    laserColors: ['255, 0, 127', '0, 229, 255'],
                    horizonColor: '#00e5ff'
                };
                COLORS[0] = '#ff007f'; COLORS[1] = '#00e5ff'; COLORS[2] = '#39ff14'; COLORS[3] = '#ffff00';
                currentBpm = 120;
            }
            
            // UIのキー設定ボタンやヘッダーのボーダー色などの要素も連動してネオンカラーを調整可能
            const root = document.documentElement;
            root.style.setProperty('--primary-neon', themeConfig.primaryColor);
            root.style.setProperty('--secondary-neon', themeConfig.secondaryColor);
        }

        // --- 3D Projection & Scaling ---
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            // 消失点と判定ラインの高さを設定
            vanishingY = height * 0.25; // 消失点のY
            yOffset = height * 0.65;    // Z=0(判定ライン)の時のオフセット
            
            // レーン幅の計算 (画面幅の95%を使用、最大1200px)
            const targetWidth = Math.min(width * 0.95, 1200);
            laneWorldWidth = targetWidth / LANE_COUNT;
            lanesStartX = - (LANE_COUNT * laneWorldWidth) / 2;

            // パースペクティブを画面幅に合わせて調整 (遠近感を一定に保つ)
            projD = targetWidth * 0.8;
            cameraZ = -projD;
            
            // スピードも世界のスケールに合わせて調整
            NOTE_SPEED = projD * 4;
            
            initStars();
        }
        window.addEventListener('resize', resize);

        // ワールド座標(X, Z)から画面座標(X, Y, スケール)への射影関数
        function project(worldX, worldZ, worldY = 0) {
            let shakeX = 0;
            let shakeY = 0;
            if (cameraShake > 0) {
                shakeX = (Math.random() - 0.5) * cameraShake * 18;
                shakeY = (Math.random() - 0.5) * cameraShake * 18;
            }
            const dz = worldZ - cameraZ;
            if (dz <= 10) return null; // カメラより後ろは描画しない
            const scale = projD / dz;
            const screenX = width / 2 + (worldX + shakeX) * scale;
            const screenY = vanishingY + (yOffset + worldY + shakeY) * scale;
            return { x: screenX, y: screenY, scale: scale };
        }

        function initStars() {
            bgStars = [];
            for (let i = 0; i < 100; i++) {
                bgStars.push({
                    x: (Math.random() - 0.5) * 2000,
                    y: (Math.random() - 0.5) * 1000,
                    z: Math.random() * 2000,
                    size: Math.random() * 3 + 1,
                    speedZ: Math.random() * 300 + 100,
                    alpha: Math.random()
                });
            }
        }

        // --- 音声 (Tone.js) セットアップ ---
        function initAudio() {
            if (synth) {
                synth.dispose();
            }

            const instType = document.getElementById('instrument-select').value;
            let synthClass = Tone.Synth;
            let options = {};

            if (instType === 'fmsynth') {
                synthClass = Tone.FMSynth;
                options = { harmonicity: 3, modulationIndex: 10, oscillator: { type: "sine" }, envelope: { attack: 0.01, decay: 0.2, sustain: 0.2, release: 0.5 } };
            } else if (instType === 'amsynth') {
                synthClass = Tone.AMSynth;
                options = { harmonicity: 2, oscillator: { type: "square" }, envelope: { attack: 0.01, decay: 0.1, sustain: 0.2, release: 0.5 } };
            } else if (instType === 'duosynth') {
                synthClass = Tone.DuoSynth;
                options = { vibratoAmount: 0.5, vibratoRate: 5, voice0: { oscillator: { type: "square" } }, voice1: { oscillator: { type: "sawtooth" } } };
            } else {
                synthClass = Tone.Synth;
                options = { oscillator: { type: "sawtooth" }, envelope: { attack: 0.01, decay: 0.1, sustain: 0.2, release: 1 } };
            }

            synth = new Tone.PolySynth(synthClass, options).toDestination();
            const limiter = new Tone.Limiter(-5).toDestination();
            synth.connect(limiter);
        }

        // MIDIの曲調（テンポ・音符密度・調性）を解析して背景演出テーマを適用する
        function analyzeMidiMoodAndApplyTheme(midi) {
            // テンポ (BPM) の取得
            const bpm = (midi.header && midi.header.tempos && midi.header.tempos[0]) ? midi.header.tempos[0].bpm : 120;
            
            // 音符の密度（1秒間あたりの平均ノート数）を計算
            let totalNotes = 0;
            midi.tracks.forEach(track => {
                totalNotes += track.notes.length;
            });
            const duration = midi.duration || 60;
            const notesPerSecond = totalNotes / duration;
            
            // 長調(Major)か短調(Minor)かの判定
            let isMajor = true;
            if (midi.header && midi.header.keySignatures && midi.header.keySignatures[0]) {
                const keySig = midi.header.keySignatures[0];
                if (keySig.scale === 'minor') {
                    isMajor = false;
                }
            }
            
            console.log(`MIDI Analysis -> BPM: ${Math.round(bpm)}, Notes/Sec: ${notesPerSecond.toFixed(2)}, IsMajor: ${isMajor}`);
            
            // 曲調パラメータに基づいて背景テーマを分類適用
            if (bpm >= 130 || notesPerSecond >= 7.5) {
                // 高速または高密度 -> Cyber Runner (赤/オレンジ警告色、超高速、険しい山)
                applyTheme('cyber_runner');
            } else if (bpm <= 92 || notesPerSecond <= 2.8) {
                // 低速または低密度 -> Neon Highway (紫/マゼンタ、ゆったり、穏やかな波)
                applyTheme('neon_highway');
            } else if (isMajor) {
                // 中速で明るい長調 -> Retro Future (黄緑/黄色、弾むようなポップな波)
                applyTheme('retro_future');
            } else {
                // 中速でクールな短調 -> Neon Beat (ピンク/シアン、標準)
                applyTheme('neon_beat');
            }
        }

        function base64ToArrayBuffer(base64) {
            const binaryString = atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

        function generateOriginalSong(songKey) {
            const midi = new Midi();
            let songName = "";
            let tempo = 120;
            let melodyNotes = [];
            let bassNotes = [];
            
            if (songKey === 'neon_highway') {
                songName = "Neon Highway";
                tempo = 110;
                
                const highwayMelody = [
                    // Am
                    { midi: 69, time: 0.0, duration: 0.5 }, { midi: 72, time: 0.5, duration: 0.5 },
                    { midi: 76, time: 1.0, duration: 0.5 }, { midi: 81, time: 1.5, duration: 0.5 },
                    { midi: 79, time: 2.0, duration: 0.5 }, { midi: 76, time: 2.5, duration: 0.5 },
                    { midi: 74, time: 3.0, duration: 0.5 }, { midi: 76, time: 3.5, duration: 0.5 },
                    // G
                    { midi: 67, time: 4.0, duration: 0.5 }, { midi: 71, time: 4.5, duration: 0.5 },
                    { midi: 74, time: 5.0, duration: 0.5 }, { midi: 79, time: 5.5, duration: 0.5 },
                    { midi: 78, time: 6.0, duration: 0.5 }, { midi: 74, time: 6.5, duration: 0.5 },
                    { midi: 72, time: 7.0, duration: 0.5 }, { midi: 74, time: 7.5, duration: 0.5 },
                    // F
                    { midi: 65, time: 8.0, duration: 0.5 }, { midi: 69, time: 8.5, duration: 0.5 },
                    { midi: 72, time: 9.0, duration: 0.5 }, { midi: 77, time: 9.5, duration: 0.5 },
                    { midi: 76, time: 10.0, duration: 0.5 }, { midi: 72, time: 10.5, duration: 0.5 },
                    { midi: 71, time: 11.0, duration: 0.5 }, { midi: 72, time: 11.5, duration: 0.5 },
                    // Em
                    { midi: 64, time: 12.0, duration: 0.5 }, { midi: 67, time: 12.5, duration: 0.5 },
                    { midi: 71, time: 13.0, duration: 0.5 }, { midi: 76, time: 13.5, duration: 0.5 },
                    { midi: 74, time: 14.0, duration: 0.5 }, { midi: 71, time: 14.5, duration: 0.5 },
                    { midi: 69, time: 15.0, duration: 0.5 }, { midi: 71, time: 15.5, duration: 0.5 }
                ];
                
                for (let cycle = 0; cycle < 8; cycle++) {
                    const timeShift = cycle * 16.0;
                    let midiShift = 0;
                    let skipNotes = false;
                    
                    if (cycle === 2 || cycle === 3 || cycle === 6 || cycle === 7) {
                        midiShift = 12; // Soaring lead
                    } else if (cycle === 4 || cycle === 5) {
                        midiShift = -12; // Subdued lead
                        skipNotes = true;
                    }
                    
                    highwayMelody.forEach((n, idx) => {
                        if (skipNotes && idx % 2 === 1) return;
                        melodyNotes.push({
                            midi: n.midi + midiShift,
                            time: n.time + timeShift,
                            duration: n.duration
                        });
                    });
                }
                
                const roots = [45, 43, 41, 40]; // A2, G2, F2, E2
                for (let cycle = 0; cycle < 8; cycle++) {
                    const cycleOffset = cycle * 16;
                    for (let m = 0; m < 4; m++) {
                        const measureOffset = cycleOffset + m * 4;
                        const root = roots[m];
                        let bassRoot = root;
                        if (cycle === 4 || cycle === 5) {
                            bassRoot -= 12; // Sub-bass range
                        }
                        bassNotes.push({ midi: bassRoot, time: measureOffset, duration: 1.8 });
                        bassNotes.push({ midi: bassRoot, time: measureOffset + 2.0, duration: 1.8 });
                    }
                }
            } else if (songKey === 'cyber_runner') {
                songName = "Cyber Runner";
                tempo = 135;
                
                const runnerMotifs = [
                    [62, 65, 69, 74, 72, 69, 67, 69], // Dm
                    [70, 74, 77, 82, 81, 77, 74, 77], // Bb
                    [72, 76, 79, 84, 83, 79, 76, 79], // C
                    [69, 72, 76, 81, 79, 76, 74, 76]  // Am
                ];
                for (let cycle = 0; cycle < 8; cycle++) {
                    if (cycle === 4 || cycle === 5) continue; // Melody break!
                    
                    const cycleOffset = cycle * 16;
                    const midiShift = (cycle === 2 || cycle === 3 || cycle === 6 || cycle === 7) ? 12 : 0;
                    
                    for (let m = 0; m < 4; m++) {
                        const measureOffset = cycleOffset + m * 4;
                        const notes = runnerMotifs[m];
                        notes.forEach((note, index) => {
                            melodyNotes.push({
                                midi: note + midiShift,
                                time: measureOffset + index * 0.5,
                                duration: 0.45
                            });
                        });
                    }
                }
                
                const runnerRoots = [50, 46, 48, 45]; // D3, Bb2, C3, A2
                for (let cycle = 0; cycle < 8; cycle++) {
                    const cycleOffset = cycle * 16;
                    for (let m = 0; m < 4; m++) {
                        const measureOffset = cycleOffset + m * 4;
                        const root = runnerRoots[m];
                        if (cycle === 4 || cycle === 5) {
                            // Alternate octaves during the break!
                            for (let i = 0; i < 8; i++) {
                                const octaveShift = i % 2 === 1 ? 12 : 0;
                                bassNotes.push({
                                    midi: root + octaveShift,
                                    time: measureOffset + i * 0.5,
                                    duration: 0.4
                                });
                            }
                        } else {
                            for (let i = 0; i < 8; i++) {
                                bassNotes.push({
                                    midi: root,
                                    time: measureOffset + i * 0.5,
                                    duration: 0.4
                                });
                            }
                        }
                    }
                }
            } else if (songKey === 'retro_future') {
                songName = "Retro Future";
                tempo = 120;
                
                const futureMotifs = [
                    [64, 64, 71, 69, 67, 66, 67, 64], // Em
                    [67, 67, 74, 72, 71, 69, 71, 67], // C
                    [71, 71, 78, 76, 74, 73, 74, 71], // G
                    [69, 69, 76, 74, 73, 71, 73, 69]  // D
                ];
                for (let cycle = 0; cycle < 8; cycle++) {
                    const cycleOffset = cycle * 16;
                    let midiShift = 0;
                    let shortDuration = false;
                    
                    if (cycle === 2 || cycle === 3 || cycle === 6 || cycle === 7) {
                        midiShift = 12;
                    } else if (cycle === 4 || cycle === 5) {
                        midiShift = -12;
                        shortDuration = true;
                    }
                    
                    for (let m = 0; m < 4; m++) {
                        const measureOffset = cycleOffset + m * 4;
                        const notes = futureMotifs[m];
                        const rhythm = [
                            { t: 0.0, d: 0.9 },
                            { t: 1.0, d: 0.45 },
                            { t: 1.5, d: 0.45 },
                            { t: 2.0, d: 0.9 },
                            { t: 3.0, d: 0.9 }
                        ];
                        rhythm.forEach((r, idx) => {
                            const note = notes[idx % notes.length];
                            melodyNotes.push({
                                midi: note + midiShift,
                                time: measureOffset + r.t,
                                duration: shortDuration ? 0.15 : r.d
                            });
                        });
                    }
                }
                
                const futureRoots = [52, 48, 55, 50]; // E3, C3, G3, D3
                for (let cycle = 0; cycle < 8; cycle++) {
                    const cycleOffset = cycle * 16;
                    for (let m = 0; m < 4; m++) {
                        const measureOffset = cycleOffset + m * 4;
                        const root = futureRoots[m];
                        const bassRhythm = [0.0, 1.5, 2.0, 3.0];
                        bassRhythm.forEach(t => {
                            bassNotes.push({
                                midi: root,
                                time: measureOffset + t,
                                duration: 0.45
                            });
                        });
                    }
                }
            }
            
            const beatDuration = 60.0 / tempo;
            
            const melodyTrack = midi.addTrack();
            melodyTrack.name = "Lead Synth";
            melodyTrack.channel = 0;
            melodyTrack.instrument = { name: "Lead Synth" };
            melodyNotes.forEach(n => {
                melodyTrack.addNote({
                    midi: n.midi,
                    time: n.time * beatDuration,
                    duration: n.duration * beatDuration
                });
            });
            
            const bassTrack = midi.addTrack();
            bassTrack.name = "Synth Bass";
            bassTrack.channel = 1;
            bassTrack.instrument = { name: "Synth Bass" };
            bassNotes.forEach(n => {
                bassTrack.addNote({
                    midi: n.midi,
                    time: n.time * beatDuration,
                    duration: n.duration * beatDuration
                });
            });
            
            return { midi, name: `${songName} (${tempo} BPM)` };
        }

        function updateDurationDisplay() {

            if (!durationEl) return;
